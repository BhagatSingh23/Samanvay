{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    # ── fabric-api ──────────────────────────────────────────
    - host: {{ .Values.ingress.hosts.api.host }}
      http:
        paths:
          {{- range .Values.ingress.hosts.api.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-fabric-api
                port:
                  number: {{ $.Values.fabricApi.port }}
          {{- end }}
    # ── dashboard ───────────────────────────────────────────
    - host: {{ .Values.ingress.hosts.dashboard.host }}
      http:
        paths:
          {{- range .Values.ingress.hosts.dashboard.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-dashboard
                port:
                  number: {{ $.Values.dashboard.port }}
          {{- end }}
{{- end }}
