spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092

  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql

fabric:
  kafka:
    topics:
      sws-inbound: sws.inbound.events
      dept-inbound: dept.inbound.events
      propagation-outbound: propagation.outbound.events
      audit-trail: audit.trail.events
      conflict-detected: conflict.detected.events
      dlq: dlq.events
    partitions:
      high: 1
      low: 1

adapter:
  poll:
    interval: 999999999
  snapshot:
    cron: "-"

drift:
  detector:
    cron: "-"

outbox:
  worker:
    fixedDelay: 999999999

resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 5
      poll-SHOP_ESTAB:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
      snapshot-REVENUE:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
