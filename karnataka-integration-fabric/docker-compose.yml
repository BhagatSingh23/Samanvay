version: "3.9"

services:
  # ── Data Stores ───────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: fabric-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fabric_db
      POSTGRES_USER: fabric
      POSTGRES_PASSWORD: fabric
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fabric -d fabric_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fabric-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  # ── Kafka Cluster ─────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fabric-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    # internal only — no host port mapping

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fabric-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 6
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Application ───────────────────────────────────────────────

  fabric-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fabric-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fabric_db
      SPRING_DATASOURCE_USERNAME: fabric
      SPRING_DATASOURCE_PASSWORD: fabric
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Mock External Systems (WireMock) ──────────────────────────

  mock-sws:
    image: wiremock/wiremock:3.5.4
    container_name: fabric-mock-sws
    ports:
      - "8081:8080"
    volumes:
      - ./stubs/sws:/home/wiremock
    command: --verbose

  mock-factories:
    image: wiremock/wiremock:3.5.4
    container_name: fabric-mock-factories
    ports:
      - "8082:8080"
    volumes:
      - ./stubs/factories:/home/wiremock
    command: --verbose

  mock-shop-estab:
    image: wiremock/wiremock:3.5.4
    container_name: fabric-mock-shop-estab
    ports:
      - "8083:8080"
    volumes:
      - ./stubs/shop_estab:/home/wiremock
    command: --verbose

  mock-revenue:
    image: wiremock/wiremock:3.5.4
    container_name: fabric-mock-revenue
    ports:
      - "8084:8080"
    volumes:
      - ./stubs/revenue:/home/wiremock
    command: --verbose

volumes:
  postgres_data:
