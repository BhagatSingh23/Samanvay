server:
  port: 8080

spring:
  application:
    name: karnataka-integration-fabric

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: fabric-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379

# ── Fabric Kafka Topic Configuration ─────────────────────────

fabric:
  kafka:
    topics:
      sws-inbound: sws.inbound.events
      dept-inbound: dept.inbound.events
      propagation-outbound: propagation.outbound.events
      audit-trail: audit.trail.events
      conflict-detected: conflict.detected.events
      dlq: dlq.events
    partitions:
      high: 6
      low: 3
  nlquery:
    enabled: true
    llm-provider: anthropic
    model: claude-sonnet-4-20250514
    max-result-rows: 200
    api-key: ${LLM_API_KEY:placeholder}
  escalation:
    enabled: true
    check-interval-ms: 60000
    default-sla-minutes: 240
    default-fallback-policy: SOURCE_PRIORITY
    level2-extension-seconds: 3600
  health-scoring:
    enabled: true
    window-hours: 24
    cache-ttl-seconds: 60
    history-cron: "0 0 * * * *"
    grade-thresholds:
      a: 90
      b: 75
      c: 60

# ── Actuator ──────────────────────────────────────────────────

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# ── Polling Adapter ───────────────────────────────────────────

adapter:
  poll:
    interval: 30000
  snapshot:
    cron: "0 */5 * * * *"

# ── Schema Drift Detector ────────────────────────────────────

drift:
  detector:
    cron: "0 0 */6 * * *"

# ── Outbox Worker ────────────────────────────────────────────

outbox:
  worker:
    fixedDelay: 5000

# ── Conflict Detection ───────────────────────────────────────

conflict:
  window:
    seconds: 30

# ── Resilience4j ──────────────────────────────────────────────

resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      poll-SHOP_ESTAB:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
      snapshot-REVENUE:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
  retry:
    instances:
      default:
        max-attempts: 3
        wait-duration: 500ms

# ── Logging ───────────────────────────────────────────────────

logging:
  level:
    com.karnataka.fabric: DEBUG
    org.springframework.kafka: WARN
