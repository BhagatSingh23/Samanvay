apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-zookeeper
  labels:
    app.kubernetes.io/name: zookeeper
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-zookeeper
  replicas: {{ .Values.zookeeper.replicas }}
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
        app.kubernetes.io/name: zookeeper
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: zookeeper
          image: "{{ .Values.zookeeper.image.repository }}:{{ .Values.zookeeper.image.tag }}"
          ports:
            - containerPort: {{ .Values.zookeeper.port }}
              name: client
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "{{ .Values.zookeeper.port }}"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          resources:
            requests:
              cpu: {{ .Values.zookeeper.resources.requests.cpu }}
              memory: {{ .Values.zookeeper.resources.requests.memory }}
            limits:
              cpu: {{ .Values.zookeeper.resources.limits.cpu }}
              memory: {{ .Values.zookeeper.resources.limits.memory }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-kafka
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-kafka
  replicas: {{ .Values.kafka.replicas }}
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        app.kubernetes.io/name: kafka
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          ports:
            - containerPort: {{ .Values.kafka.port }}
              name: external
            - containerPort: {{ .Values.kafka.internalPort }}
              name: internal
          env:
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: {{ .Release.Name }}-zookeeper:{{ .Values.zookeeper.port }}
            - name: KAFKA_LISTENERS
              value: "INTERNAL://0.0.0.0:{{ .Values.kafka.internalPort }},EXTERNAL://0.0.0.0:{{ .Values.kafka.port }}"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "INTERNAL://{{ .Release.Name }}-kafka:{{ .Values.kafka.internalPort }},EXTERNAL://localhost:{{ .Values.kafka.port }}"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "INTERNAL"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_NUM_PARTITIONS
              value: "6"
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - kafka-topics --bootstrap-server localhost:{{ .Values.kafka.port }} --list
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.kafka.resources.requests.cpu }}
              memory: {{ .Values.kafka.resources.requests.memory }}
            limits:
              cpu: {{ .Values.kafka.resources.limits.cpu }}
              memory: {{ .Values.kafka.resources.limits.memory }}
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.kafka.storage.storageClassName }}
        storageClassName: {{ .Values.kafka.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.kafka.storage.size }}
